bookdown::gitbook:
  download: ["pdf"]
  css: custom-style.css
  split_bib: no
  includes:
    after_body: js/lang-toggle-include.html
  config:
    toc:
      collapse: section
      before: |
        <li><a href="./">Apunte de Marketing Engineering</a></li>
      after: |
        <li><a href="https://github.com/rstudio/bookdown" target="blank">Published with bookdown</a></li>
    sharing:
      facebook: no
      twitter: no
      all: no
  pandoc_args: ["--mathjax"]
  mathjax: "https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"

bookdown::pdf_book:
  latex_engine: xelatex
  keep_tex: true
  toc_depth: 3
  includes:
    in_header: preamble.tex
  pandoc_args: ["--lua-filter=lua/es-only.lua"]
